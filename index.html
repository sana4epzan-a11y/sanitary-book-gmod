<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Санитарная книга</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="48" height="48" rx="4" fill="currentColor" opacity="0.12"/>
          <path d="M24 8v32M8 24h32" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-sub">Military RP · GMod · MST</span>
        <span class="logo-title">Санитарная книга</span>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="Закрыть меню">×</button>
    </div>

    <nav class="nav-tree" id="navTree" aria-label="Разделы книги"></nav>

    <div class="sidebar-footer">
      <span class="status-dot"></span>
      Классифицировано · Мед. отдел
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main class="main">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Открыть меню">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title" id="topbarTitle">Санитарная книга</div>
      <div class="topbar-badge">MST PROJECT</div>
    </header>

    <article class="content" id="content"></article>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
